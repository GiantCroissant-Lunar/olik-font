# git-cliff configuration — generates CHANGELOG.md from conventional-commit history.
# See: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. This file is
generated from the git history via [git-cliff](https://git-cliff.org/) —
do not edit by hand.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat",           group = "Features" },
  { message = "^fix",            group = "Bug Fixes" },
  { message = "^perf",           group = "Performance" },
  { message = "^refactor",       group = "Refactor" },
  { message = "^docs",           group = "Documentation" },
  { message = "^test",           group = "Tests" },
  { message = "^chore",          group = "Chore" },
  { message = "^ci",             group = "CI" },
  { message = "^build",          group = "Build" },
  { message = "^style",          group = "Style" },
  { message = "^revert",         group = "Revert" },
  { message = "^Merge",          skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*|plan-[0-9]+-[a-z0-9-]+"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
