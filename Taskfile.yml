# Taskfile — unified shortcuts for the repo. https://taskfile.dev
#
# Quick usage:
#   task              # list available tasks
#   task setup        # one-time: set up venv, install deps, pre-commit hooks
#   task test         # run everything (py + ts)
#   task lint         # check formatting + lint (py + ts)
#   task fmt          # apply formatting fixes
#   task archon:run WF=plan-02-python-core
#   task cliff        # regenerate CHANGELOG.md

version: "3"

vars:
  PY_DIR: project/py
  TS_DIR: project/ts
  VENV: project/py/.venv
  PYTEST: "{{.VENV}}/bin/pytest"
  RUFF: "{{.VENV}}/bin/ruff"
  PIP: "{{.VENV}}/bin/pip"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ─── Setup ─────────────────────────────────────────────────────────────
  setup:
    desc: One-time setup — venv, pnpm, pre-commit hooks
    cmds:
      - task: setup:py
      - task: setup:ts
      - task: setup:hooks

  setup:py:
    desc: Create venv + install Python deps
    cmds:
      - |
        cd {{.PY_DIR}}
        if [ ! -x .venv/bin/pytest ]; then
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
        fi

  setup:ts:
    desc: Install pnpm workspace deps
    cmds:
      - cd {{.TS_DIR}} && pnpm install

  setup:hooks:
    desc: Install pre-commit git hooks
    cmds:
      - pre-commit install --install-hooks

  # ─── Test ──────────────────────────────────────────────────────────────
  test:
    desc: Run all tests (py + ts)
    deps: [test:py, test:ts]

  test:py:
    desc: Run pytest
    cmds:
      - cd {{.PY_DIR}} && ../../{{.PYTEST}} -v

  test:ts:
    desc: Run vitest across all ts packages
    cmds:
      - cd {{.TS_DIR}} && pnpm -r --parallel test

  # ─── Lint / Format ─────────────────────────────────────────────────────
  lint:
    desc: Check formatting + lint across everything
    deps: [lint:py, lint:ts, lint:commits]

  lint:py:
    desc: Ruff format check + lint
    cmds:
      - cd {{.PY_DIR}} && ../../{{.RUFF}} format --check .
      - cd {{.PY_DIR}} && ../../{{.RUFF}} check .

  lint:ts:
    desc: Biome check
    cmds:
      - cd {{.TS_DIR}} && pnpm run lint

  lint:commits:
    desc: Verify recent commits follow conventional-commit format
    cmds:
      - pre-commit run conventional-pre-commit --from-ref HEAD~10 --to-ref HEAD || true

  fmt:
    desc: Apply formatting fixes (py + ts)
    deps: [fmt:py, fmt:ts]

  fmt:py:
    cmds:
      - cd {{.PY_DIR}} && ../../{{.RUFF}} format .
      - cd {{.PY_DIR}} && ../../{{.RUFF}} check --fix .

  fmt:ts:
    cmds:
      - cd {{.TS_DIR}} && pnpm run format

  # ─── Build ─────────────────────────────────────────────────────────────
  build:ts:
    desc: Build all ts packages
    cmds:
      - cd {{.TS_DIR}} && pnpm -r --filter './packages/*' run build

  typecheck:ts:
    desc: Typecheck all ts packages
    cmds:
      - cd {{.TS_DIR}} && pnpm run typecheck

  # ─── Archon ────────────────────────────────────────────────────────────
  # Run workflows. Override workflow name via WF=<name>.
  archon:run:
    desc: "Run an Archon workflow. Usage: task archon:run WF=plan-02-python-core"
    vars:
      WF: '{{.WF | default "plan-02-python-core"}}'
    cmds:
      - set -a; source infra/.env; set +a; env -u CLAUDECODE archon workflow run {{.WF}}

  archon:status:
    desc: Show Archon workflow status
    cmds:
      - set -a; source infra/.env; set +a; env -u CLAUDECODE archon workflow status

  archon:validate:
    desc: Validate all Archon workflow YAMLs
    cmds:
      - set -a; source infra/.env; set +a; env -u CLAUDECODE archon validate workflows

  # ─── Changelog ─────────────────────────────────────────────────────────
  cliff:
    desc: Regenerate CHANGELOG.md from conventional commits
    cmds:
      - git-cliff --config cliff.toml --output CHANGELOG.md

  cliff:unreleased:
    desc: Show changelog for unreleased commits
    cmds:
      - git-cliff --config cliff.toml --unreleased

  # ─── Data + Code Generation ────────────────────────────────────────────
  data:regen-cjk-decomp:
    desc: Fetch upstream cjk-decomp at pinned commit, rewrite project/py/data/cjk-decomp.json
    cmds:
      - python3 scripts/regen-cjk-decomp.py
      - task: codegen:cjk-decomp

  codegen:cjk-decomp:
    desc: Regenerate cjk-decomp types from schema via quicktype (py + ts + zod)
    vars:
      SCHEMA: project/schema/cjk-decomp.schema.json
      PY_OUT: project/py/src/olik_font/generated/cjk_decomp_types.py
      TS_OUT: project/ts/packages/glyph-schema/src/generated/cjk-decomp-types.ts
      ZOD_OUT: project/ts/packages/glyph-schema/src/generated/cjk-decomp-zod.ts
    cmds:
      - mkdir -p "$(dirname {{.PY_OUT}})" "$(dirname {{.TS_OUT}})"
      - quicktype --src-lang schema --lang py --python-version 3.7 --top-level CjkDecomp --out {{.PY_OUT}} {{.SCHEMA}}
      - quicktype --src-lang schema --lang ts --just-types --top-level CjkDecomp --out {{.TS_OUT}} {{.SCHEMA}}
      - quicktype --src-lang schema --lang typescript-zod --top-level CjkDecomp --out {{.ZOD_OUT}} {{.SCHEMA}}

  codegen:all:
    desc: Run every codegen target
    deps: [codegen:cjk-decomp]

  # ─── Preview ───────────────────────────────────────────────────────────
  preview:glyph:
    desc: "Render a glyph-record JSON as an SVG (opens in default viewer). Usage: task preview:glyph CHAR=明"
    vars:
      CHAR: '{{.CHAR | default "明"}}'
      REC: "project/schema/examples/glyph-record-{{.CHAR}}.json"
      OUT: "preview/{{.CHAR}}.svg"
    cmds:
      - mkdir -p preview
      - python3 scripts/preview-glyph.py "{{.REC}}" --out "{{.OUT}}"
      - open "{{.OUT}}" 2>/dev/null || echo "wrote {{.OUT}}"

  preview:seed:
    desc: Render SVG previews for all 4 seed characters (明 清 國 森)
    cmds:
      - mkdir -p preview
      - |
        for ch in 明 清 國 森; do
          rec="project/schema/examples/glyph-record-$ch.json"
          if [ -f "$rec" ]; then
            python3 scripts/preview-glyph.py "$rec" --out "preview/$ch.svg"
          else
            echo "missing: $rec (run \`task archon:run WF=plan-03-python-compose-cli\` first)"
          fi
        done
      - open preview/*.svg 2>/dev/null || echo "previews written to preview/*.svg"

  db:up:
    desc: Start the persistent SurrealDB (surrealkv://infra/surrealdb/data) if not running
    cmds:
      - |
        if lsof -ti:6480 >/dev/null 2>&1; then
          echo "already listening on 6480"
        else
          mkdir -p infra/surrealdb/data
          nohup surreal start --user root --pass root --bind 0.0.0.0:6480 \
            "surrealkv://$(pwd)/infra/surrealdb/data" \
            > /tmp/surrealdb.log 2>&1 &
          echo "started PID $!"
        fi

  db:down:
    desc: Stop whichever surreal process is on :6480
    cmds:
      - |
        pid=$(lsof -ti:6480 2>/dev/null || true)
        if [ -n "$pid" ]; then kill "$pid" && echo "stopped $pid"; else echo "nothing on 6480"; fi

  db:reset:
    desc: Wipe the persistent DB directory and re-seed
    deps: [db:down]
    cmds:
      - rm -rf infra/surrealdb/data/*
      - task: db:up
      - "{{.VENV}}/bin/olik db reset --yes"
      - task: db:seed

  db:seed:
    desc: Populate hanfont/olik with the 4 seed chars
    cmds:
      - "{{.VENV}}/bin/olik db sync 明 清 國 森"

  db:export:
    desc: Dump hanfont/olik back to JSON under infra/surrealdb/snapshots/<date>
    cmds:
      - |
        dir="infra/surrealdb/snapshots/$(date +%Y-%m-%d)"
        mkdir -p "$dir"
        "{{.VENV}}/bin/olik" db export --out "$dir"
        echo "wrote $dir"

  # ─── Housekeeping ──────────────────────────────────────────────────────
  clean:
    desc: Remove venv, node_modules, pytest caches, dist dirs
    cmds:
      - rm -rf {{.VENV}} {{.PY_DIR}}/.pytest_cache {{.PY_DIR}}/**/__pycache__
      - rm -rf {{.TS_DIR}}/node_modules {{.TS_DIR}}/**/node_modules {{.TS_DIR}}/**/dist

  worktree:list:
    desc: List all git worktrees (including Archon's)
    cmds:
      - git worktree list
      - echo "---"
      - ls -la ~/.archon/worktrees 2>/dev/null || echo "(no archon worktrees yet)"
