name: plan-05-ts-viz-primitives
description: >-
  Execute Plan 05 (TS viz primitives — @olik/glyph-viz). Framework-neutral
  React/SVG component library consumed later by Remotion (Plan 06) and the
  xyflow Inspector (Plan 07). No runtime deps on Remotion or xyflow —
  primitives take validated types from @olik/glyph-schema (merged on main
  as of commit b11800c) and render into the caller's <svg> root.
provider: codex
model: gpt-5.4

nodes:
  # --------------------------------------------------------------------------
  # 1. pnpm install (workspace).
  # --------------------------------------------------------------------------
  - id: setup-ts
    bash: |
      set -e
      cd project/ts
      corepack enable >/dev/null 2>&1 || true
      pnpm --version
      pnpm install --frozen-lockfile=false 2>&1 | tail -10

  # --------------------------------------------------------------------------
  # 2. Sanity-check Plan 04's packages are built (or buildable). Plan 05's
  #    React/SVG components import types from @olik/glyph-schema; we also
  #    want its dist/ present so vitest in downstream packages can resolve
  #    it without alias gymnastics (glyph-viz tests are in glyph-viz's own
  #    package, not loader, so @olik/glyph-schema will resolve via
  #    workspace node_modules → package.json exports → dist/).
  # --------------------------------------------------------------------------
  - id: prebuild-schema
    depends_on: [setup-ts]
    bash: |
      set -e
      cd project/ts
      pnpm --filter "@olik/glyph-schema" build 2>&1 | tail -10
      test -f packages/glyph-schema/dist/index.js
      test -f packages/glyph-schema/dist/index.d.ts
      echo "glyph-schema dist ready."

  # --------------------------------------------------------------------------
  # 3. Implementation loop. Plan 05 has 8 tasks: scaffold + theme,
  #    StrokePath, VirtualCoordGrid/BBoxOverlay/AnchorMarker, TreeLayout,
  #    GraphLayout, LayerStack, IoUBadge/InputAdapterChip/ModeIndicator,
  #    final build + tag.
  # --------------------------------------------------------------------------
  - id: implement
    depends_on: [prebuild-schema]
    loop:
      prompt: |
        You are Codex, implementing Plan 05 (TS viz primitives) task-by-task.

        ## Context
        Plan file: `vault/plans/2026-04-21-05-ts-viz-primitives.md`.
        Tasks are `## Task N:` headers. Each task ends with a commit whose
        message is spelled out in the plan.

        Plans 01, 02, 03, and 04 are merged on main. In particular:
          - `@olik/glyph-schema` exists at `project/ts/packages/glyph-schema`
            (built via prebuild-schema before this loop started). Import
            type-only references from it as shown in the plan.
          - Real seed records live under `project/schema/examples/` if any
            test needs concrete data (most Plan 05 tests use synthetic
            fixtures — follow the plan exactly).

        ## Your single-iteration job

        1. Read the plan.
        2. Run `git log --oneline -20` to see what's committed. Match
           commit messages to the task-commit messages in the plan.
        3. Determine the next task.
           - If nothing committed yet for Plan 05, start at Task 1.
           - If Task K is the last committed task, start Task K+1.
           - If Task 8 is the last committed task (plan-05-ts-viz-primitives
             tag applied), output **exactly** the single word `COMPLETE`
             on its own line and exit.
        4. Implement every step exactly as written in the plan. Follow
           TDD: failing test first → verify it fails → implement → verify
           it passes.
        5. Run the verification command shown in the task (pnpm typecheck,
           pnpm test, pnpm build). It must pass before commit.
        6. Run the commit command exactly as shown in the plan.
        7. Output **exactly** one of these on the last line:
           - `NEXT` — continue the loop
           - `COMPLETE` — plan done (after Task 8's tag)
           - `BLOCKED: <one-line reason>` — stop (do not invent a fix)

        ## Constraints
        - Work only inside the current worktree.
        - Never skip the fail-first check for TDD tasks.
        - Never amend or rebase. Fresh commits only.
        - If a plan step imports from `@olik/glyph-viz` in its own test
          (self-reference), use relative paths within `../src/...` — do
          not rely on the package's own exports map from inside the
          package.
        - If tsup DTS generation fails with a `composite` error, add a
          package-local `"composite": false` to that package's
          tsconfig.json — same fix as Plan 04 Task 5.
        - `jsdom` is required for React tests; install it as a devDep
          per the plan's package.json. Set `test.environment: "jsdom"`
          in vitest.config.ts per the plan.

        Output format: last line MUST be exactly `NEXT`, `COMPLETE`, or
        `BLOCKED: <reason>`.
      until: COMPLETE
      fresh_context: true
      max_iterations: 12
      idle_timeout: 1800000  # 30 min per task

  # --------------------------------------------------------------------------
  # 4. Workspace-wide test run — adds glyph-viz tests on top of Plan 04's.
  # --------------------------------------------------------------------------
  - id: run-tests
    depends_on: [implement]
    bash: |
      set -e
      cd project/ts && pnpm -r test 2>&1 | tail -50

  # --------------------------------------------------------------------------
  # 5. Workspace-wide build — proves glyph-viz produces ESM+CJS+dts.
  # --------------------------------------------------------------------------
  - id: run-build
    depends_on: [run-tests]
    bash: |
      set -e
      cd project/ts
      pnpm -r --filter "@olik/glyph-schema" \
              --filter "@olik/glyph-loader" \
              --filter "@olik/glyph-viz" build 2>&1 | tail -30
      echo ""
      echo "### Build artifacts"
      for pkg in glyph-schema glyph-loader glyph-viz; do
        echo "  project/ts/packages/$pkg/dist/:"
        ls -la "packages/$pkg/dist/" 2>/dev/null | awk 'NR>1 {print "    "$9" ("$5" bytes)"}'
      done

  # --------------------------------------------------------------------------
  # 6. Auto-approve on tests green + glyph-viz dist populated.
  # --------------------------------------------------------------------------
  - id: approve
    depends_on: [run-build]
    bash: |
      set -e
      echo "## Plan 05 run summary"
      echo ""
      echo "### Commits"
      git log --oneline main..HEAD
      echo ""
      echo "### Final test tail"
      echo "$run-tests.output" | tail -10
      echo ""

      tests_ok=0
      build_ok=0

      if echo "$run-tests.output" | grep -qE '[0-9]+ passed' && \
         ! echo "$run-tests.output" | grep -qE '[1-9][0-9]* failed'; then
        tests_ok=1
      fi
      if [ -f project/ts/packages/glyph-viz/dist/index.js ] && \
         [ -f project/ts/packages/glyph-viz/dist/index.d.ts ]; then
        build_ok=1
      fi

      if [ $tests_ok -eq 1 ] && [ $build_ok -eq 1 ]; then
        echo "VERDICT: AUTO-APPROVED (tests green, glyph-viz built)"
      else
        echo "VERDICT: REJECTED (tests_ok=$tests_ok build_ok=$build_ok)"
        exit 1
      fi

  # --------------------------------------------------------------------------
  # 7. Open the PR.
  # --------------------------------------------------------------------------
  - id: create-pr
    depends_on: [approve]
    prompt: |
      Push the current branch to `origin` and open a pull request against
      `main`. Use `gh pr create`.

      Title: `Plan 05: TS viz primitives — @olik/glyph-viz`

      Body:
        - 1-line summary: framework-neutral React/SVG primitive library
          for use by Remotion (Plan 06) and xyflow Inspector (Plan 07).
        - Commit list: `git log --oneline main..HEAD`.
        - Final test count (per-package breakdown if easy).
        - Unblocks Plan 07 (flow-nodes + rule-viz imports from glyph-viz).
        - Links: spec, Plan 05 doc
          (vault/plans/2026-04-21-05-ts-viz-primitives.md), Plan 04
          (foundation) predecessor.

      Output the final PR URL on the last line.
    idle_timeout: 300000
