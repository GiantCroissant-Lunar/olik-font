# Hand-authored extraction + depth plan for the 4 seed characters.
# Resolves D2, D3, D9 from the design spec.

schema_version: "0.1"

prototypes:
  - id: proto:sun
    name: "日"
    from_char: "明"
    stroke_indices: [0, 1, 2, 3]
    roles: [meaning]
    anchors:
      center: [512, 512]
      left_edge: [0, 512]
      right_edge: [1024, 512]
      top: [512, 0]
      bottom: [512, 1024]

  - id: proto:moon
    name: "月"
    from_char: "明"
    stroke_indices: [4, 5, 6, 7]
    roles: [meaning]
    anchors:
      center: [512, 512]
      left_edge: [0, 512]
      right_edge: [1024, 512]
      top: [512, 0]
      bottom: [512, 1024]

  - id: proto:water_3dots
    name: "氵"
    from_char: "清"
    stroke_indices: [0, 1, 2]
    roles: [meaning]
    anchors:
      center: [512, 512]
      right_edge: [1024, 512]
      top: [512, 0]
      bottom: [512, 1024]

  - id: proto:sheng
    name: "龶"
    from_char: "青"
    stroke_indices: [0, 1, 2, 3]
    roles: [sound]
    anchors:
      center: [512, 512]
      top: [512, 0]
      bottom: [512, 1024]

  # Context-specific variants of 龶 and 月 as they appear inside 清's 青
  # subtree. Proportions differ from the canonical 青-extracted / 明-extracted
  # versions because 清 compresses 青 into its right column, so we re-extract
  # from 清 directly to keep compose IoU high.
  - id: proto:sheng_in_qing
    name: "龶"
    from_char: "清"
    stroke_indices: [3, 4, 5, 6]
    roles: [sound]
    anchors:
      center: [512, 512]
      top: [512, 0]
      bottom: [512, 1024]

  - id: proto:moon_in_qing
    name: "月"
    from_char: "清"
    stroke_indices: [7, 8, 9, 10]
    roles: [meaning]
    anchors:
      center: [512, 512]
      left_edge: [0, 512]
      right_edge: [1024, 512]
      top: [512, 0]
      bottom: [512, 1024]

  # 國's stroke order is NOT "囗 first, 或 second". MMH writes the
  # enclosure's open top/sides first, then the inner 或, then closes the
  # box last — so 囗 is strokes [0,1,10] and 或 is [2..9], not [0,1,2]
  # and [3..10].
  - id: proto:enclosure_box
    name: "囗"
    from_char: "國"
    stroke_indices: [0, 1, 10]
    roles: [meaning]
    anchors:
      center: [512, 512]
      inner_frame: [128, 128]
      inner_frame_end: [896, 896]

  - id: proto:huo
    name: "或"
    from_char: "國"
    stroke_indices: [2, 3, 4, 5, 6, 7, 8, 9]
    roles: [sound]
    anchors:
      center: [512, 512]

  - id: proto:tree
    name: "木"
    from_char: "森"
    stroke_indices: [0, 1, 2, 3]
    roles: [meaning]
    anchors:
      center: [512, 512]
      top: [512, 0]
      bottom: [512, 1024]
      left: [0, 512]
      right: [1024, 512]

glyphs:
  明:
    children:
      - prototype_ref: proto:sun
        mode: keep
        source_stroke_indices: [0, 1, 2, 3]
      - prototype_ref: proto:moon
        mode: keep
        source_stroke_indices: [4, 5, 6, 7]

  清:
    children:
      - prototype_ref: proto:water_3dots
        mode: keep
        source_stroke_indices: [0, 1, 2]
      - prototype_ref: proto:qing
        mode: refine
        children:
          - prototype_ref: proto:sheng_in_qing
            mode: keep
            source_stroke_indices: [3, 4, 5, 6]
          - prototype_ref: proto:moon_in_qing
            mode: keep
            source_stroke_indices: [7, 8, 9, 10]

  國:
    children:
      - prototype_ref: proto:enclosure_box
        mode: keep
        source_stroke_indices: [0, 1, 10]
      - prototype_ref: proto:huo
        mode: keep
        source_stroke_indices: [2, 3, 4, 5, 6, 7, 8, 9]

  森:
    children:
      - prototype_ref: proto:tree
        mode: keep
        source_stroke_indices: [0, 1, 2, 3]
      - prototype_ref: proto:tree
        mode: keep
        source_stroke_indices: [4, 5, 6, 7]
      - prototype_ref: proto:tree
        mode: keep
        source_stroke_indices: [8, 9, 10, 11]
